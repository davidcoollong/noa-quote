<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOA 견적서</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Malgun Gothic', '맑은 고딕', Arial, sans-serif; background: #f0f2f5; color: #1a1a1a; }

  .app-header {
    background: #1a1a2e;
    color: white;
    padding: 14px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .app-header .logo { font-size: 20px; font-weight: 700; letter-spacing: 2px; }
  .app-header .logo span { color: #e8b86d; }
  .header-actions { display: flex; gap: 10px; }
  .btn {
    padding: 8px 18px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.2s;
  }
  .btn-primary { background: #e8b86d; color: #1a1a2e; }
  .btn-primary:hover { background: #d4a055; }
  .btn-outline { background: transparent; color: white; border: 1px solid rgba(255,255,255,0.4); }
  .btn-outline:hover { background: rgba(255,255,255,0.1); }
  .btn-danger { background: #e74c3c; color: white; padding: 5px 10px; font-size: 12px; border-radius: 4px; }
  .btn-danger:hover { background: #c0392b; }
  .btn-add { background: #27ae60; color: white; padding: 8px 16px; font-size: 13px; border-radius: 6px; width: 100%; }
  .btn-add:hover { background: #219a52; }

  .container { max-width: 980px; margin: 30px auto; padding: 0 20px 60px; }

  .card {
    background: white;
    border-radius: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    overflow: hidden;
    margin-bottom: 20px;
  }
  .card-header {
    background: #1a1a2e;
    color: white;
    padding: 14px 24px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-header .dot { width: 8px; height: 8px; border-radius: 50%; background: #e8b86d; }
  .card-body { padding: 24px; }

  /* Quote Document */
  .quote-doc {
    background: white;
    border-radius: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    overflow: hidden;
    margin-bottom: 20px;
  }
  .quote-title-bar {
    background: #1a1a2e;
    padding: 28px 40px;
    text-align: center;
  }
  .quote-title-input {
    background: transparent;
    border: none;
    border-bottom: 2px solid rgba(232,184,109,0.5);
    color: white;
    font-size: 22px;
    font-weight: 700;
    text-align: center;
    width: 100%;
    padding: 4px 0;
    outline: none;
    letter-spacing: 1px;
  }
  .quote-title-input::placeholder { color: rgba(255,255,255,0.4); }
  .quote-title-input:focus { border-bottom-color: #e8b86d; }

  .quote-meta {
    background: #f8f9ff;
    border-bottom: 1px solid #e8eaf0;
    padding: 16px 40px;
    display: flex;
    gap: 32px;
    align-items: center;
    flex-wrap: wrap;
  }
  .meta-item { display: flex; align-items: center; gap: 8px; font-size: 13px; }
  .meta-label { color: #888; font-weight: 500; white-space: nowrap; }
  .meta-input {
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 13px;
    outline: none;
    font-family: inherit;
  }
  .meta-input:focus { border-color: #1a1a2e; }

  /* Parties Section */
  .parties { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
  .party {
    padding: 24px 40px;
    border-right: 1px solid #e8eaf0;
  }
  .party:last-child { border-right: none; }
  .party-label {
    font-size: 11px;
    font-weight: 700;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .party-label::after { content: ''; flex: 1; height: 1px; background: #e8eaf0; }
  .party-name { font-size: 18px; font-weight: 700; color: #1a1a2e; margin-bottom: 10px; }
  .party-detail { display: flex; font-size: 13px; margin-bottom: 5px; gap: 8px; }
  .party-detail-label { color: #888; min-width: 48px; }
  .party-detail-value { color: #333; }
  .party-selector { margin-bottom: 12px; }
  .party-selector select {
    width: 100%;
    padding: 8px 12px;
    border: 1px solid #ddd;
    border-radius: 6px;
    font-size: 13px;
    font-family: inherit;
    background: #f8f9ff;
    color: #1a1a2e;
    cursor: pointer;
    outline: none;
  }
  .party-selector select:focus { border-color: #1a1a2e; }

  /* Items Table */
  .items-section { padding: 24px 40px; }
  .section-title {
    font-size: 13px;
    font-weight: 700;
    color: #1a1a2e;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::before { content: '●'; color: #e8b86d; }

  .items-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .items-table th {
    background: #1a1a2e;
    color: white;
    padding: 10px 12px;
    text-align: center;
    font-weight: 600;
    font-size: 12px;
  }
  .items-table th:first-child { border-radius: 8px 0 0 0; }
  .items-table th:last-child { border-radius: 0 8px 0 0; }
  .items-table td { padding: 8px 10px; border-bottom: 1px solid #f0f2f5; vertical-align: middle; }
  .items-table tr:hover td { background: #f8f9ff; }
  .items-table td input, .items-table td select {
    width: 100%;
    border: 1px solid transparent;
    border-radius: 4px;
    padding: 6px 8px;
    font-size: 13px;
    font-family: inherit;
    background: transparent;
    outline: none;
    text-align: inherit;
  }
  .items-table td input:focus, .items-table td select:focus {
    border-color: #1a1a2e;
    background: white;
  }
  .items-table td.amount { text-align: right; font-weight: 600; color: #1a1a2e; padding-right: 12px; }
  .items-table td.center { text-align: center; }
  .items-table td.right { text-align: right; }
  .items-table td input.right { text-align: right; }
  .items-table tr.total-row td { background: #f8f9ff; font-weight: 700; border-top: 2px solid #1a1a2e; }

  .col-idx { width: 36px; }
  .col-item { width: 200px; }
  .col-desc { }
  .col-price { width: 110px; }
  .col-qty { width: 70px; }
  .col-unit { width: 60px; }
  .col-amount { width: 120px; }
  .col-del { width: 44px; }

  /* Summary + Notes */
  .bottom-section { display: grid; grid-template-columns: 1fr 340px; gap: 0; border-top: 1px solid #e8eaf0; }
  .notes-section { padding: 24px 40px; border-right: 1px solid #e8eaf0; }
  .notes-section textarea {
    width: 100%;
    min-height: 140px;
    border: 1px solid #e8eaf0;
    border-radius: 8px;
    padding: 12px;
    font-size: 12.5px;
    font-family: inherit;
    line-height: 1.7;
    resize: vertical;
    outline: none;
    color: #444;
  }
  .notes-section textarea:focus { border-color: #1a1a2e; }

  .summary-section { padding: 24px 30px; background: #f8f9ff; }
  .summary-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid #e8eaf0;
    font-size: 13px;
  }
  .summary-row:last-child { border-bottom: none; }
  .summary-label { color: #666; }
  .summary-value { font-weight: 600; color: #1a1a2e; }
  .summary-row.total {
    padding: 12px 0;
    border-top: 2px solid #1a1a2e;
    border-bottom: none;
    margin-top: 4px;
  }
  .summary-row.total .summary-label { font-size: 15px; font-weight: 700; color: #1a1a2e; }
  .summary-row.total .summary-value { font-size: 18px; color: #e8b86d; font-weight: 800; }

  /* Bank Info */
  .bank-section {
    padding: 16px 40px;
    background: #fffbf2;
    border-top: 1px solid #f0d890;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 13px;
  }
  .bank-icon { font-size: 18px; }
  .bank-label { color: #888; margin-right: 4px; }
  .bank-value { font-weight: 700; color: #1a1a2e; }

  /* DB Manager */
  .db-tabs { display: flex; gap: 4px; margin-bottom: 20px; }
  .db-tab {
    padding: 8px 20px;
    border-radius: 6px 6px 0 0;
    border: none;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    background: #e8eaf0;
    color: #666;
    transition: all 0.2s;
  }
  .db-tab.active { background: #1a1a2e; color: white; }
  .db-panel { display: none; }
  .db-panel.active { display: block; }

  .db-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .db-table th { background: #f0f2f5; padding: 10px 12px; text-align: left; font-weight: 600; color: #555; border-bottom: 2px solid #e0e2e8; }
  .db-table td { padding: 9px 12px; border-bottom: 1px solid #f0f2f5; }
  .db-table tr:hover td { background: #f8f9ff; }
  .db-table td input {
    width: 100%;
    border: 1px solid transparent;
    border-radius: 4px;
    padding: 4px 8px;
    font-size: 13px;
    font-family: inherit;
    background: transparent;
    outline: none;
  }
  .db-table td input:focus { border-color: #1a1a2e; background: white; }

  .db-add-row { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  .db-add-row input {
    flex: 1;
    min-width: 100px;
    padding: 8px 12px;
    border: 1px solid #ddd;
    border-radius: 6px;
    font-size: 13px;
    font-family: inherit;
    outline: none;
  }
  .db-add-row input:focus { border-color: #1a1a2e; }

  @media print {
    body { background: white; }
    .app-header, .db-manager-card, .btn-add, .btn-danger, .meta-label, .party-selector { display: none !important; }
    .container { margin: 0; padding: 0; max-width: 100%; }
    .quote-doc { box-shadow: none; border-radius: 0; }
    .items-table td input, .items-table td select { border: none; padding: 4px; }
    .notes-section textarea { border: none; }
  }

  @media (max-width: 700px) {
    .parties { grid-template-columns: 1fr; }
    .party { border-right: none; border-bottom: 1px solid #e8eaf0; }
    .bottom-section { grid-template-columns: 1fr; }
    .notes-section { border-right: none; border-bottom: 1px solid #e8eaf0; }
    .quote-meta { gap: 12px; }
  }
</style>
</head>
<body>

<div class="app-header">
  <div class="logo">NOA<span>&</span>ARK</div>
  <div class="header-actions">
    <button class="btn btn-outline" onclick="window.print()">🖨 인쇄 / PDF</button>
    <button class="btn btn-primary" onclick="resetQuote()">+ 새 견적서</button>
  </div>
</div>

<div class="container">

  <!-- Quote Document -->
  <div class="quote-doc" id="quoteDoc">

    <!-- Title -->
    <div class="quote-title-bar">
      <input type="text" class="quote-title-input" id="quoteTitle" value="코렐라인 스노우볼 2종 제작 견적서" placeholder="견적서 제목을 입력하세요">
    </div>

    <!-- Meta -->
    <div class="quote-meta">
      <div class="meta-item">
        <span class="meta-label">견적일자</span>
        <input type="date" class="meta-input" id="quoteDate">
      </div>
      <div class="meta-item">
        <span class="meta-label">No.</span>
        <input type="text" class="meta-input" id="quoteNo" value="202601-1" style="width:110px">
      </div>
      <div class="meta-item">
        <span class="meta-label">담당자</span>
        <input type="text" class="meta-input" id="quoteManager" style="width:280px">
      </div>
    </div>

    <!-- Parties -->
    <div class="parties">
      <!-- Sender (자사) -->
      <div class="party">
        <div class="party-label">공급자 (자사)</div>
        <div class="party-selector">
          <select id="senderSelect" onchange="fillSender(this.value)">
            <option value="">-- 자사 선택 --</option>
          </select>
        </div>
        <div class="party-name" id="senderName">-</div>
        <div class="party-detail"><span class="party-detail-label">사업자</span><span class="party-detail-value" id="senderBiz">-</span></div>
        <div class="party-detail"><span class="party-detail-label">대표자</span><span class="party-detail-value" id="senderCeo">-</span></div>
        <div class="party-detail"><span class="party-detail-label">이메일</span><span class="party-detail-value" id="senderEmail">-</span></div>
        <div class="party-detail"><span class="party-detail-label">주소</span><span class="party-detail-value" id="senderAddr" style="font-size:12px">-</span></div>
      </div>
      <!-- Receiver (거래처) -->
      <div class="party">
        <div class="party-label">수신자 (거래처)</div>
        <div class="party-selector">
          <select id="receiverSelect" onchange="fillReceiver(this.value)">
            <option value="">-- 거래처 선택 --</option>
          </select>
        </div>
        <div class="party-name" id="receiverName">-</div>
        <div class="party-detail"><span class="party-detail-label">사업자</span><span class="party-detail-value" id="receiverBiz">-</span></div>
        <div class="party-detail"><span class="party-detail-label">수신자</span><span class="party-detail-value" id="receiverContact">-</span></div>
        <div class="party-detail"><span class="party-detail-label">이메일</span><span class="party-detail-value" id="receiverEmail">-</span></div>
        <div class="party-detail"><span class="party-detail-label">주소</span><span class="party-detail-value" id="receiverAddr" style="font-size:12px">-</span></div>
      </div>
    </div>

    <!-- Items -->
    <div class="items-section">
      <div class="section-title">견적항목 <span id="itemsTotal" style="color:#e8b86d; margin-left:8px"></span></div>
      <table class="items-table">
        <thead>
          <tr>
            <th class="col-idx">#</th>
            <th class="col-item">항목</th>
            <th class="col-desc">설명</th>
            <th class="col-price">단가</th>
            <th class="col-qty">수량</th>
            <th class="col-unit">단위</th>
            <th class="col-amount">금액</th>
            <th class="col-del"></th>
          </tr>
        </thead>
        <tbody id="itemsBody">
        </tbody>
      </table>
      <button class="btn-add btn" onclick="addItem()" style="margin-top:10px">+ 항목 추가</button>
    </div>

    <!-- Bottom: Notes + Summary -->
    <div class="bottom-section">
      <div class="notes-section">
        <div class="section-title">참고사항</div>
        <textarea id="quoteNotes">1. 본 견적은 최종 확정된, 디자인과 사양을 반영하였습니다.
2. 사양변경에 따른 일정변경과 견적추가는 발주사에 책임이 있습니다.
3. 디자인 수정 요청은 1회까지 무료 제공되며, 이후 요청은 추가 비용이 발생할 수 있습니다.
4. 납품장소는 1회, 지정된 장소로 입고합니다.
5. 사양 : 상기 기재 내용 기준.
6. 관세8% 적용, 14세 이상 KC인증 제외 기준입니다.
7. 3일 운송 기준 물류비입니다. 에어물류 시, 추가비용 발생입니다.</textarea>
      </div>
      <div class="summary-section">
        <div class="section-title">금액 요약</div>
        <div class="summary-row">
          <span class="summary-label">견적항목 합계</span>
          <span class="summary-value" id="sumItems">₩0</span>
        </div>
        <div class="summary-row">
          <span class="summary-label">공급가액</span>
          <span class="summary-value" id="sumSupply">₩0</span>
        </div>
        <div class="summary-row">
          <span class="summary-label">VAT (10%)</span>
          <span class="summary-value" id="sumVat">₩0</span>
        </div>
        <div class="summary-row total">
          <span class="summary-label">최종 견적</span>
          <span class="summary-value" id="sumFinal">₩0</span>
        </div>
      </div>
    </div>

    <!-- Bank Info -->
    <div class="bank-section" id="bankSection">
      <span class="bank-icon">🏦</span>
      <span class="bank-label">입금계좌</span>
      <span class="bank-value" id="bankInfo">-</span>
      <span style="margin-left:16px; color:#888; font-size:12px">견적 유효기간 이내에 납부 부탁드립니다. :)</span>
    </div>

  </div>

  <!-- DB Manager -->
  <div class="card db-manager-card">
    <div class="card-header"><span class="dot"></span>데이터베이스 관리</div>
    <div class="card-body">
      <div class="db-tabs">
        <button class="db-tab active" onclick="switchTab('company')">회사정보</button>
        <button class="db-tab" onclick="switchTab('client')">거래처DB</button>
        <button class="db-tab" onclick="switchTab('product')">품목DB</button>
      </div>

      <!-- Company DB -->
      <div class="db-panel active" id="panel-company">
        <table class="db-table" id="companyTable">
          <thead>
            <tr>
              <th>회사코드</th><th>회사명</th><th>사업자번호</th><th>대표자</th>
              <th>이메일</th><th>전화번호</th><th>은행</th><th>계좌번호</th>
              <th>담당자</th><th>담당자연락처</th><th>담당자이메일</th><th></th>
            </tr>
          </thead>
          <tbody id="companyBody"></tbody>
        </table>
        <div class="db-add-row">
          <input id="nc_code" placeholder="회사코드">
          <input id="nc_name" placeholder="회사명">
          <input id="nc_biz" placeholder="사업자번호">
          <input id="nc_ceo" placeholder="대표자">
          <input id="nc_email" placeholder="이메일">
          <input id="nc_tel" placeholder="전화번호">
          <input id="nc_bank" placeholder="은행">
          <input id="nc_acct" placeholder="계좌번호">
          <input id="nc_mgr" placeholder="담당자">
          <input id="nc_mtel" placeholder="담당자연락처">
          <input id="nc_memail" placeholder="담당자이메일">
          <button class="btn btn-primary" onclick="addCompany()">추가</button>
        </div>
      </div>

      <!-- Client DB -->
      <div class="db-panel" id="panel-client">
        <table class="db-table" id="clientTable">
          <thead>
            <tr><th>거래처코드</th><th>회사명</th><th>사업자번호</th><th>수신자</th><th>이메일</th><th>전화번호</th><th>주소</th><th>비고</th><th></th></tr>
          </thead>
          <tbody id="clientBody"></tbody>
        </table>
        <div class="db-add-row">
          <input id="cl_code" placeholder="거래처코드">
          <input id="cl_name" placeholder="회사명">
          <input id="cl_biz" placeholder="사업자번호">
          <input id="cl_contact" placeholder="수신자">
          <input id="cl_email" placeholder="이메일">
          <input id="cl_tel" placeholder="전화번호">
          <input id="cl_addr" placeholder="주소">
          <input id="cl_note" placeholder="비고">
          <button class="btn btn-primary" onclick="addClient()">추가</button>
        </div>
      </div>

      <!-- Product DB -->
      <div class="db-panel" id="panel-product">
        <table class="db-table" id="productTable">
          <thead>
            <tr><th>품목코드</th><th>항목명</th><th>설명</th><th>단가</th><th>단위</th><th>비고</th><th></th></tr>
          </thead>
          <tbody id="productBody"></tbody>
        </table>
        <div class="db-add-row">
          <input id="pr_code" placeholder="품목코드">
          <input id="pr_name" placeholder="항목명">
          <input id="pr_desc" placeholder="설명">
          <input id="pr_price" placeholder="단가" type="number">
          <input id="pr_unit" placeholder="단위">
          <input id="pr_note" placeholder="비고">
          <button class="btn btn-primary" onclick="addProduct()">추가</button>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
// ── Data ──────────────────────────────────────────────────────────────────────
const db = {
  companies: [
    { code:'NOA', name:'(주)노아코퍼레이션', biz:'487-87-02055', ceo:'김소영',
      email:'sogood@noawid.com', tel:'02-1234-5678',

// ── Utils ─────────────────────────────────────────────────────────────────────
const won = n => '₩' + Math.round(n).toLocaleString('ko-KR');
const num = s => parseFloat(String(s).replace(/,/g, '')) || 0;

function setToday() {
  const d = new Date();
  document.getElementById('quoteDate').value = d.toISOString().slice(0,10);
}

// ── Render Items ──────────────────────────────────────────────────────────────
function renderItems() {
  const tbody = document.getElementById('itemsBody');
  tbody.innerHTML = '';
  let total = 0;

  items.forEach((item, i) => {
    const amount = item.price * item.qty;
    total += amount;
    const optionsHtml = db.products.map(p =>
      `<option value="${p.code}" ${p.name === item.name ? 'selected' : ''}>${p.name}</option>`
    ).join('');

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="center" style="color:#aaa;font-size:12px">${i+1}</td>
      <td>
        <select onchange="onProductSelect(${i}, this.value)" style="width:100%;border:1px solid transparent;border-radius:4px;padding:6px 4px;font-size:13px;font-family:inherit;background:transparent;outline:none;cursor:pointer;">
          <option value="">-- 선택 --</option>
          ${optionsHtml}
          <option value="__custom__" ${!db.products.find(p=>p.name===item.name)?'selected':''}>직접입력</option>
        </select>
        <input type="text" value="${item.name}" placeholder="항목명" oninput="updateItem(${i},'name',this.value)"
          style="display:${!db.products.find(p=>p.name===item.name)?'block':'none'};margin-top:4px">
      </td>
      <td><input type="text" value="${item.desc}" placeholder="설명" oninput="updateItem(${i},'desc',this.value)"></td>
      <td><input type="text" class="right" value="${item.price.toLocaleString('ko-KR')}" placeholder="단가" oninput="updateItem(${i},'price',this.value)"></td>
      <td><input type="number" class="right" value="${item.qty}" min="0" oninput="updateItem(${i},'qty',this.value)" style="text-align:right"></td>
      <td><input type="text" value="${item.unit}" placeholder="단위" oninput="updateItem(${i},'unit',this.value)" style="text-align:center"></td>
      <td class="amount">${won(amount)}</td>
      <td class="center"><button class="btn btn-danger" onclick="removeItem(${i})">✕</button></td>
    `;
    tbody.appendChild(tr);
  });

  const vat = total * 0.1;
  const final = total + vat;
  document.getElementById('sumItems').textContent = won(total);
  document.getElementById('sumSupply').textContent = won(total);
  document.getElementById('sumVat').textContent = won(vat);
  document.getElementById('sumFinal').textContent = won(final);
  document.getElementById('itemsTotal').textContent = won(total);
}

function onProductSelect(i, code) {
  if (code === '__custom__') {
    items[i].name = '';
    items[i].desc = '';
    items[i].price = 0;
    items[i].unit = 'EA';
    renderItems();
    return;
  }
  const p = db.products.find(x => x.code === code);
  if (p) {
    items[i].name = p.name;
    items[i].desc = p.desc;
    items[i].price = p.price;
    items[i].unit = p.unit;
    renderItems();
  }
}

function updateItem(i, field, val) {
  if (field === 'price' || field === 'qty') items[i][field] = num(val);
  else items[i][field] = val;
  if (field === 'price' || field === 'qty') renderItems();
  else {
    // just update amount cell
    const rows = document.getElementById('itemsBody').rows;
    if (rows[i]) {
      const amount = items[i].price * items[i].qty;
      rows[i].cells[6].textContent = won(amount);
    }
    recalcTotals();
  }
}

function recalcTotals() {
  const total = items.reduce((s,it)=>s+it.price*it.qty, 0);
  const vat = total * 0.1;
  document.getElementById('sumItems').textContent = won(total);
  document.getElementById('sumSupply').textContent = won(total);
  document.getElementById('sumVat').textContent = won(vat);
  document.getElementById('sumFinal').textContent = won(total+vat);
  document.getElementById('itemsTotal').textContent = won(total);
}

function addItem() {
  items.push({ name:'', desc:'', price:0, qty:1, unit:'EA' });
  renderItems();
}

function removeItem(i) {
  items.splice(i, 1);
  renderItems();
}

// ── Dropdowns ─────────────────────────────────────────────────────────────────
function populateSelects() {
  const ss = document.getElementById('senderSelect');
  const rs = document.getElementById('receiverSelect');

    db.companies.map(c=>`<option value="${c.code}">${c.code} - ${c.name}</option>`).join('');
  rs.innerHTML = '<option value="">-- 거래처 선택 --</option>' +
    db.clients.map(c=>`<option value="${c.code}">${c.code} - ${c.name}</option>`).join('');
}

function fillSender(code) {
  const c = db.companies.find(x=>x.code===code);

  document.getElementById('senderName').textContent = c.name;
  document.getElementById('senderBiz').textContent = c.biz;
  document.getElementById('senderCeo').textContent = c.ceo;
  document.getElementById('senderEmail').textContent = c.email;
  document.getElementById('senderAddr').textContent = c.addr;
  document.getElementById('quoteManager').value = `${c.manager} (${c.mtel}, ${c.memail})`;
  document.getElementById('bankInfo').textContent = `${c.bank} ${c.acct} ${c.holder}`;
}

function fillReceiver(code) {
  const c = db.clients.find(x=>x.code===code);
  if (!c) return;
  document.getElementById('receiverName').textContent = c.name;
  document.getElementById('receiverBiz').textContent = c.biz;
  document.getElementById('receiverContact').textContent = c.contact;
  document.getElementById('receiverEmail').textContent = c.email;
  document.getElementById('receiverAddr').textContent = c.addr;
}

// ── Tab ───────────────────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.db-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.db-panel').forEach(p => p.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('panel-'+name).classList.add('active');
}

// ── Reset ─────────────────────────────────────────────────────────────────────
function resetQuote() {
  if (!confirm('새 견적서를 작성하시겠습니까? 현재 내용은 초기화됩니다.')) return;
  document.getElementById('quoteTitle').value = '견적서';
  document.getElementById('quoteNo').value = 'NO-' + Date.now().toString().slice(-6);
  document.getElementById('quoteManager').value = '';
  document.getElementById('senderSelect').value = '';
  document.getElementById('receiverSelect').value = '';
  ['senderName','senderBiz','senderCeo','senderEmail','senderAddr'].forEach(id=>document.getElementById(id).textContent='-');
  ['receiverName','receiverBiz','receiverContact','receiverEmail','receiverAddr'].forEach(id=>document.getElementById(id).textContent='-');
  document.getElementById('bankInfo').textContent = '-';
  items = [{ name:'', desc:'', price:0, qty:1, unit:'EA' }];
  renderItems();
  setToday();
}
